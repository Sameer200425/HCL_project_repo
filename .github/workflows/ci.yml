name: Bank ViT Fraud Detection CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # This is a great debugging step! Check the output of this step 
      # in GitHub Actions to see the exact folder structure.
      - name: List repo files
        run: ls -R

      - name: Install dependencies manually
        run: |
          pip install torch torchvision timm transformers datasets einops numpy pandas Pillow opencv-python-headless scikit-learn scipy albumentations shap grad-cam captum matplotlib seaborn plotly fpdf2 reportlab pyyaml omegaconf tensorboard tqdm colorama onnx onnxruntime fastapi uvicorn sqlalchemy pytest pytest-cov pytest-asyncio httpx

      - name: Train ViT Fraud Detection Model
        # IMPORTANT: Change this to the folder that actually contains train.py and config.yaml
        working-directory: ./your_folder_name 
        run: python train.py --config config.yaml
