name: Bank ViT Fraud Detection CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: 3.11
      NODE_VERSION: 20
      DOCKER_REGISTRY: ghcr.io
      IMAGE_NAME: Sameer200425/HCL_project_repo

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Upgrade pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Debug: list files so you can confirm requirements.txt and config.yaml are found
      - name: List files
        run: ls -R .vscode/project/bank_vit_project

      # Install dependencies from requirements.txt
      - name: Install dependencies
        working-directory: .vscode/project/bank_vit_project
        run: pip install -r requirements.txt

      # Run tests (optional)
      - name: Run tests
        working-directory: .vscode/project/bank_vit_project
        run: pytest --maxfail=1 --disable-warnings -q

      # Train Vision Transformer model using config.yaml
      - name: Train ViT Fraud Detection Model
        working-directory: .vscode/project/bank_vit_project
        run: |
          echo "Starting training with config.yaml..."
          python train.py --config config.yaml

      # Save model artifacts
      - name: Upload model checkpoints
        uses: actions/upload-artifact@v4
        with:
          name: vit-model-checkpoints
          path: .vscode/project/bank_vit_project/checkpoints/
