# ============================================================
# Vision Transformer (ViT) - Banking Fraud Detection Config
# ============================================================
# Project: Explainable Vision Transformer with Self-Supervised
#          Learning for Financial Document & Fraud Image Analytics
# ============================================================

# --- Project Metadata ---
project:
  name: "bank_vit_fraud_detection"
  version: "2.0.0"
  description: "ViT-based Financial Document Fraud Detection with XAI, SSL, Uncertainty Quantification & Regulatory Compliance"
  domain: "Banking & Finance"
  area: "Data Analytics + AI/ML"
  hcl_tech:
    theme: "Vision Transformer (ViT) based Image Recognition with Explainable AI & Self-Supervised Pretraining"
    unique_features:
      - "Monte Carlo Dropout Uncertainty Quantification"
      - "Fraud Trend Analytics Engine with Anomaly Detection"
      - "Active Learning with Entropy / Margin / Core-Set strategies"
      - "RBI + BASEL III + FATF Regulatory Compliance Report Generator"
      - "Hybrid CNN+ViT with ResNet50 backbone"
      - "MAE + SimCLR Self-Supervised Pretraining"
      - "Knowledge Distillation (ViT → CNN) for edge deployment"
      - "Federated Learning simulation across bank branches"

# --- Random Seed (Reproducibility) ---
seed: 42

# --- Data Configuration ---
data:
  raw_dir: "data/raw_images"         # place your real bank documents here
  processed_dir: "data/processed"    # prepared by setup_datasets.py --prepare
  uploads_dir: "data/uploads"        # real-time uploads from API / frontend
  image_size: 224
  patch_size: 16
  num_channels: 3
  split_ratios:
    train: 0.70
    val: 0.15
    test: 0.15
  augmentation:
    random_crop: true
    horizontal_flip: true
    color_jitter: true
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
  classes:
    - "genuine"
    - "fraud"
    - "tampered"
    - "forged"
  # External real datasets
  external_datasets:
    cedar_signatures: "data/cedar_signatures"
    rvl_cdip: "data/rvl_cdip"
    creditcard_csv: "data/transactions/creditcard.csv"

# --- Vision Transformer (ViT) Configuration ---
# Reference: "An Image is Worth 16x16 Words" (Dosovitskiy et al.)
vit:
  image_size: 224
  patch_size: 16
  embedding_dim: 768
  num_heads: 12
  num_layers: 12
  mlp_dim: 3072
  dropout: 0.1
  attention_dropout: 0.0
  num_classes: 4

# --- CNN Baseline Configuration ---
cnn:
  backbone: "resnet50"
  pretrained: true
  num_classes: 4

# --- Hybrid Model (CNN + ViT) ---
hybrid:
  cnn_backbone: "resnet50"
  cnn_features: 2048
  vit_embedding_dim: 768
  vit_num_heads: 12
  vit_num_layers: 6
  num_classes: 4

# --- Self-Supervised Pretraining (MAE) ---
# Reference: "Masked Autoencoders Are Scalable Vision Learners" (He et al.)
ssl:
  method: "mae"  # Options: "mae", "contrastive"
  mae:
    mask_ratio: 0.75
    decoder_embedding_dim: 512
    decoder_num_heads: 16
    decoder_num_layers: 8
    reconstruction_loss: "mse"
    epochs: 50
    batch_size: 64
    learning_rate: 1.5e-4
    weight_decay: 0.05
    warmup_epochs: 10
  contrastive:
    temperature: 0.07
    projection_dim: 256
    epochs: 100
    batch_size: 128
    learning_rate: 3e-4

# --- Fine-Tuning Configuration ---
training:
  epochs: 100
  batch_size: 32
  optimizer: "adamw"
  learning_rate: 3.0e-4
  weight_decay: 0.05
  scheduler: "cosine_annealing"
  warmup_epochs: 5
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
  mixed_precision: true
  gradient_clip: 1.0
  loss: "cross_entropy"
  label_smoothing: 0.1

# --- Explainability Configuration ---
explainability:
  attention_maps:
    enabled: true
    layer: -1  # Last transformer layer
    head: "all"  # all heads or specific index
  gradcam:
    enabled: true
    target_layer: "encoder.layers.11"
    overlay_alpha: 0.5
  shap:
    enabled: true
    num_samples: 100
    max_display: 20
  report:
    format: "pdf"
    include_heatmap: true
    include_confidence: true
    include_attention: true
    output_dir: "reports/"

# --- Analytics Configuration ---
analytics:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "roc_auc"
    - "confusion_matrix"
  risk_scoring:
    attention_weight: 0.4
    confidence_weight: 0.35
    anomaly_weight: 0.25
  export:
    format: "csv"
    output_dir: "results/"

# --- Knowledge Distillation ---
distillation:
  enabled: true
  teacher_model: "vit_large"
  student_model: "vit_small"
  temperature: 4.0
  alpha: 0.5  # Balance between hard and soft labels
  student_config:
    embedding_dim: 384
    num_heads: 6
    num_layers: 6

# --- Federated Learning Simulation ---
federated:
  enabled: false
  num_clients: 5   # Simulated bank branches
  rounds: 20
  local_epochs: 5
  aggregation: "fedavg"

# --- Adversarial Robustness ---
adversarial:
  enabled: true
  attacks:
    - type: "gaussian_noise"
      severity: [0.01, 0.05, 0.1]
    - type: "blur"
      kernel_sizes: [3, 5, 7]
    - type: "pixel_tamper"
      ratio: [0.01, 0.05, 0.1]

# --- Model Checkpoints ---
checkpoints:
  save_dir: "checkpoints/"
  save_best: true
  save_every: 5
  monitor: "val_f1"
  mode: "max"

# --- Logging ---
logging:
  level: "INFO"
  log_dir: "logs/"
  tensorboard: true
  wandb:
    enabled: false
    project: "bank_vit_fraud"

# --- Frontend ---
frontend:
  host: "localhost"
  port: 3000
  title: "Financial Document Fraud Detection System"

# ============================================================
# NEW: Uncertainty Quantification (MC Dropout)
# ============================================================
uncertainty:
  enabled: true
  mc_passes: 50              # Number of stochastic forward passes
  dropout_rate: 0.1
  human_review_threshold: 0.35   # UQ score above this → flag for audit
  levels:
    low:      0.15
    medium:   0.30
    high:     0.50
    # >= high → CRITICAL

# ============================================================
# NEW: Active Learning Pipeline
# ============================================================
active_learning:
  enabled: true
  strategy: "entropy"        # Options: entropy, least_confidence, margin_sampling, core_set, ensemble
  query_size: 50             # Documents to select per AL round
  fraud_priority_boost: true # Elevate priority for fraud-predicted unlabeled samples
  max_review_queue: 500

# ============================================================
# NEW: Fraud Trend Analytics Engine
# ============================================================
fraud_analytics:
  enabled: true
  rolling_window_days: 7
  anomaly_z_threshold: 2.5
  report_schedule:
    weekly: true
    monthly: true
  branch_hotspots_top_n: 5
  risk_thresholds:
    low:    0.05
    medium: 0.15
    high:   0.30
    # >= high → CRITICAL

# ============================================================
# NEW: Regulatory Compliance Reporting
# ============================================================
compliance:
  enabled: true
  bank_name: "ABC Bank Ltd."
  rbi_registration_ref: "RBI/2024/AI/00X"
  review_cycle_days: 90
  frameworks:
    - "RBI IT Framework 2011"
    - "RBI Master Direction on Fraud 2016"
    - "BASEL III Operational Risk (SMA)"
    - "FATF Recommendations 10, 11, 20"
  output_dir: "reports/"
  save_json_checklist: true
