name: Bank ViT Fraud Detection CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: 3.11
      NODE_VERSION: 20
      DOCKER_REGISTRY: ghcr.io
      IMAGE_NAME: Sameer200425/HCL_project_repo

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Upgrade pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Debug: list files so you can confirm requirements.txt is found
      - name: List files
        run: ls -R .vscode/project/bank_vit_project

      # Install dependencies from requirements.txt
      - name: Install dependencies
        working-directory: .vscode/project/bank_vit_project
        run: pip install -r requirements.txt

      # Optional: Run tests
      - name: Run tests
        working-directory: .vscode/project/bank_vit_project
        run: pytest --maxfail=1 --disable-warnings -q

      # Optional: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

