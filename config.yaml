data:
  # Changed from ./data/processed to the actual folder created by the script
  processed_dir: "./data/cedar_signatures" 
  # Changed to match the folder names created by your script
  classes: ["genuine", "forged"] 
  image_size: 224

training:
  batch_size: 32
  epochs: 10
  learning_rate: 0.0001

name: Bank ViT Fraud Detection CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: 3.11
      DOCKER_REGISTRY: ghcr.io
      IMAGE_NAME: Sameer200425/HCL_project_repo

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Upgrade pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Debug: list repo files
      - name: List repo files
        run: ls -R

      # Install dependencies manually
      - name: Install core dependencies
        run: |
          pip install torch torchvision timm transformers datasets einops numpy pandas Pillow opencv-python-headless scikit-learn scipy albumentations shap grad-cam captum matplotlib seaborn plotly fpdf2 reportlab pyyaml omegaconf tensorboard tqdm colorama onnx onnxruntime fastapi uvicorn sqlalchemy pytest pytest-cov pytest-asyncio httpx

      # Generate data and verify where it went
      - name: Generate Sample Data and Debug
        run: |
          echo "Running data generation..."
          
          # If create_sample_data.py is the wrong script, change this to setup_datasets.py
          python create_sample_data.py
          
          echo "--- CHECKING WHERE THE IMAGES WERE SAVED ---"
          # This will print out all folders and files so we can find the images
          ls -R data/ || ls -R
          
      # Train Vision Transformer model using config.yaml
      - name: Train ViT Fraud Detection Model
        run: python main_training.py --config config.yaml

      # Save model artifacts
      - name: Upload model checkpoints
        uses: actions/upload-artifact@v4
        if: always()  # This ensures it tries to upload even if training fails
        with:
          name: vit-model-checkpoints
          path: checkpoints/