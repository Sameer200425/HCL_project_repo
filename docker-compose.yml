# Docker Compose for Bank Fraud Detection
# ========================================
# Start all services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f

version: "3.8"

services:
  # FastAPI Backend (authenticated app with DB)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./model_registry:/app/model_registry
      - ./logs:/app/logs
      - db-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_TYPE=cnn
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:///./fraud_detection.db
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fraud-detection-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
  checkpoints:
  model_registry:
  logs:
