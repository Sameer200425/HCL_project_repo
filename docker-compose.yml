# Docker Compose for Bank Fraud Detection
# ========================================
# Start all services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f

services:
  # FastAPI Backend (authenticated app with DB)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./model_registry:/app/model_registry
      - ./logs:/app/logs
      - db-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - MODEL_TYPE=cnn
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql://fraud_user:fraud_pass@postgres:5432/fraud_detection
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fraud-detection-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - postgres
      - api
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: fraud-detection-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

  # PostgreSQL for production-like validation
  postgres:
    image: postgres:15
    container_name: fraud-detection-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fraud_detection
      - POSTGRES_USER=fraud_user
      - POSTGRES_PASSWORD=fraud_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data:
  checkpoints:
  model_registry:
  logs:
  neo4j-data:
  postgres-data:
